<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Index.html plugin demo</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #006ebb;
      --green: #00856f;
      --ink: #1f2933;
      --muted: #56616f;
      --line: #d7dee8;
      --bg: #f7f9fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      display: grid;
      gap: 1rem;
      padding: 1.25rem;
    }

    .panel {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 10px 28px rgba(31, 41, 51, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(0, 110, 187, 0.11), rgba(0, 133, 111, 0.1));
    }

    h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.35;
    }

    .content {
      display: grid;
      gap: 1rem;
      padding: 1.25rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .metric {
      min-height: 82px;
      padding: 0.85rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
    }

    .metric strong {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 650;
    }

    .metric span {
      display: block;
      font-size: 1.35rem;
      color: var(--blue);
      font-weight: 750;
    }

    button {
      justify-self: start;
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      color: #ffffff;
      background: var(--blue);
      font-weight: 700;
      cursor: pointer;
    }

    button:focus-visible {
      outline: 3px solid rgba(0, 110, 187, 0.28);
      outline-offset: 2px;
    }

    button:hover {
      background: #005a99;
    }

    .note {
      border-left: 4px solid var(--green);
      padding: 0.75rem 0.9rem;
      background: #f1fbf8;
      color: #24443d;
    }

    @media (max-width: 560px) {
      main {
        padding: 0.75rem;
      }

      .status {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="plugin-title">
      <div class="header">
        <h1 id="plugin-title">Geladenes index.html-Plugin</h1>
      </div>
      <div class="content">
        <p>
          Diese Datei liegt unter <code>_static_h5p/h5p/index-html-plugin/index.html</code>
          und wird in der Jupyter-Book-Seite per iframe geladen.
        </p>

        <div class="status" aria-label="Plugin status">
          <div class="metric">
            <strong>Status</strong>
            <span>aktiv</span>
          </div>
          <div class="metric">
            <strong>Quelle</strong>
            <span>HTML</span>
          </div>
          <div class="metric">
            <strong>Klicks</strong>
            <span id="click-count">0</span>
          </div>
        </div>

        <button type="button" id="test-button">Interaktion testen</button>

        <p class="note" id="feedback" aria-live="polite">
          Das Plugin ist geladen. Der Button prueft, ob JavaScript im iframe ausgefuehrt wird.
        </p>
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById("test-button");
    const count = document.getElementById("click-count");
    const feedback = document.getElementById("feedback");
    let clicks = 0;

    button.addEventListener("click", () => {
      clicks += 1;
      count.textContent = String(clicks);
      feedback.textContent = `JavaScript im iframe funktioniert. Klick ${clicks} wurde registriert.`;
    });
  </script>
</body>
</html>
