repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'ruff check --fix --target-version=py$(cat .python-version | tr -d "\n." ) "$@"' --
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: bash -c 'ruff format --target-version=py$(cat .python-version | tr -d "\n.") "$@"' --
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: bash -c 'mypy --python-version=$(cat .python-version | tr -d "\n") "$@"' --
        language: system
        types: [python]
